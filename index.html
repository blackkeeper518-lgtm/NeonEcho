<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voice Neon - Fast & Furious Edition</title>
    <style>
        :root {
            --bg: #0a0a0c;
            --card: #151518;
            --neon: #00f2ff; /* เปลี่ยนเป็นสีฟ้าตัดส้มให้ดูไวขึ้น */
            --neon-glow: rgba(0, 242, 255, 0.4);
            --text: #e2e8f0;
        }
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg);
            background-image: radial-gradient(circle at 50% 50%, #101020 0%, #0a0a0c 100%);
            color: var(--text);
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; margin: 0;
        }
        .container {
            background: var(--card); width: 90%; max-width: 500px;
            padding: 2.5rem; border-radius: 24px;
            border: 1px solid var(--neon);
            box-shadow: 0 0 30px var(--neon-glow);
            text-align: center;
        }
        h2 { color: #fff; text-shadow: 0 0 10px var(--neon); margin-bottom: 1rem; }
        textarea {
            width: 100%; height: 200px; padding: 15px; background: #000;
            border: 1px solid #333; border-radius: 12px; color: var(--neon);
            margin-bottom: 1rem; outline: none; box-sizing: border-box; resize: none;
        }
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 1rem; }
        select, input {
            padding: 10px; background: #1a1a1d; border: 1px solid #333;
            color: #fff; border-radius: 8px; font-size: 12px;
        }
        button {
            width: 100%; padding: 16px; background: var(--neon); color: #000;
            border: none; border-radius: 12px; font-weight: bold; cursor: pointer;
            text-transform: uppercase; letter-spacing: 1px;
        }
        button:disabled { background: #444; color: #888; cursor: not-allowed; }
        #status { font-size: 10px; color: var(--neon); margin-top: 1rem; font-family: monospace; }
    </style>
</head>
<body>

<div class="container">
    <h2>FAST VOICE NEON</h2>
    <textarea id="t" placeholder="ยัดข้อความยาวๆ มาเลย เดี๋ยวจัดให้แบบไวแสง..."></textarea>
    
    <div class="controls">
        <select id="v">
            <option value="Puck">Puck (ไว/กวน)</option>
            <option value="Charon">Charon (นุ่มแต่ไว)</option>
            <option value="Kore">Kore (มาตรฐาน)</option>
        </select>
        <input type="number" id="speed" value="1.5" step="0.1" min="0.5" max="2.0" title="ความเร็วเสียง">
    </div>

    <button id="b" onclick="startTalking()">GENERATE & SPEAK FAST</button>
    <div id="status">READY TO BLAST</div>
</div>

<script>
    const apiKey = "AIzaSyDnbpXFRJqrBFehlAN-T1x56P201VC1Zm4"; 
    const modelName = "gemini-1.5-flash"; // เน้นความไว

    let audioQueue = [];
    let isPlaying = false;

    async function startTalking() {
        const text = document.getElementById('t').value;
        const voiceName = document.getElementById('v').value;
        const speed = document.getElementById('speed').value;
        const btn = document.getElementById('b');
        const st = document.getElementById('status');

        if (!text) { alert("ยัดข้อความมาก่อนอีชาย!"); return; }

        btn.disabled = true;
        st.innerText = "กำลังประมวลผลแบบเร่งด่วน...";
        
        // แบ่งข้อความเป็นส่วนๆ ถ้ามันยาวเกินไป (Split by punctuation)
        const chunks = text.match(/[^.!?\n]+[.!?\n]*/g) || [text];
        
        audioQueue = [];
        
        try {
            for (let chunk of chunks) {
                if (chunk.trim().length === 0) continue;
                
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${modelName}:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: chunk }] }],
                        generationConfig: {
                            responseModalities: ["AUDIO"],
                            speechConfig: {
                                voiceConfig: {
                                    prebuiltVoiceConfig: { voiceName: voiceName }
                                }
                            }
                        }
                    })
                });

                const data = await response.json();
                const audioPart = data.candidates?.[0]?.content?.parts?.find(p => p.inlineData);
                
                if (audioPart) {
                    audioQueue.push({
                        data: audioPart.inlineData.data,
                        speed: speed
                    });
                    if (!isPlaying) playNext();
                }
            }
        } catch (e) {
            st.innerText = "พังดิ: " + e.message;
        } finally {
            btn.disabled = false;
        }
    }

    function playNext() {
        if (audioQueue.length === 0) {
            isPlaying = false;
            document.getElementById('status').innerText = "READY";
            return;
        }

        isPlaying = true;
        const current = audioQueue.shift();
        const blob = b64ToBlob(current.data, "audio/wav");
        const url = URL.createObjectURL(blob);
        const audio = new Audio(url);
        
        // ปรับ Speed ในตัว Audio Tag
        audio.playbackRate = current.speed;
        
        document.getElementById('status').innerText = "กำลังพ่นไฟ...";
        audio.play();
        audio.onended = () => {
            URL.revokeObjectURL(url);
            playNext();
        };
    }

    function b64ToBlob(b64, type) {
        const bin = atob(b64);
        const arr = new Uint8Array(bin.length);
        for (let i = 0; i < bin.length; i++) arr[i] = bin.charCodeAt(i);
        return new Blob([arr], { type: type });
    }
</script>

</body>
</html>
